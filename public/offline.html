<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Offline — Jorrey</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100svh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#0C0C0C;color:#FAFAF7;
  font-family:Georgia,'Times New Roman',serif;
  padding:2.5rem 1.5rem;text-align:center;
}
.mark{
  width:68px;height:68px;
  border:2px solid rgba(201,169,110,.4);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 2.25rem;
}
.mark-j{font-size:2.25rem;font-weight:700;color:#C9A96E;line-height:1}
h1{font-size:1.5rem;color:#C9A96E;font-weight:600;margin-bottom:.6rem;letter-spacing:-.01em}
.en{font-size:.9rem;color:rgba(250,250,247,.5);line-height:1.7;max-width:300px}
.ar{
  margin-top:1.5rem;
  font-size:.9rem;color:rgba(250,250,247,.4);line-height:1.7;
  max-width:300px;direction:rtl;
  font-family:'Segoe UI',Arial,sans-serif;
}
button{
  margin-top:2.25rem;padding:.7rem 2rem;
  background:transparent;
  border:1px solid rgba(201,169,110,.45);
  color:#C9A96E;cursor:pointer;
  font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;
  transition:background .2s,color .2s;
}
button:hover{background:#C9A96E;color:#0C0C0C}
</style>
</head>
<body>
<div class="mark"><span class="mark-j">J</span></div>
<h1>You&rsquo;re offline</h1>
<p class="en">This page isn&rsquo;t available offline yet.<br>Check your connection and try again.</p>
<p class="ar">هذه الصفحة غير متاحة بدون اتصال بالإنترنت.<br>تحقق من اتصالك وحاول مجدداً.</p>
<button onclick="location.reload()">Try again &nbsp;/&nbsp; أعد المحاولة</button>
</body>
</html>
